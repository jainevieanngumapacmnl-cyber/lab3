<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive CSS Grid Layout</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    
    <div class="container">

      
        <header class="header">
            <h1>Header / Navigation</h1>

            <nav class="navbar">
                <a href="#">Home</a>
                <a href="#">About</a>
                <a href="#">Services</a>
                <a href="#">Contact</a>
            </nav>
        </header>

      
        <aside class="sidebar">
            <h2>Sidebar</h2>
            <ul>
                <li>Dashboard</li>
                <li>Profile</li>
                <li>Settings</li>
                <li>Messages</li>
            </ul>
        </aside>

        
        <main class="main-content">
            <h2>Main Content</h2>

            <div class="card-container">

                <div class="card">
                    <h3>Card 1</h3>
                    <p>JOHNREY</p>
                </div>

                <div class="card">
                    <h3>Card 2</h3>
                    <p>ELAN</p>
                </div>

                <div class="card">
                    <h3>Card 3</h3>
                    <p>ROSSEL</p>
                </div>

                <div class="card">
                    <h3>Card 4</h3>
                    <p>LORRAINE</p>
                </div>

            </div>
        </main>

     
        <footer class="footer">
            <p>Footer Section</p>
        </footer>

    </div>

</body>
</html>
